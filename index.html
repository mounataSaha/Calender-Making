<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calender</title>

<style>

h1{

text-align: center;
text-transform: uppercase;

}

.calender {

display: grid;
grid-template-columns: repeat(7, 1fr);

background-color: blanchedalmond;
border: 4px solid black;
border-radius: 10px;
height: 557px;
width: 900px;
row-gap: 10px;
column-gap: 5px;
margin: 0px auto;
background-image: url(./Image/white\ love.jpg);
background-size: cover;
background-position: center;
background-repeat:no-repeat ;


/* align-items: center;
align-content: center;
margin-left: 250px; */



}



.date-day {

background-color: aqua;
border-radius: 5px;
font-size: 20px;
font-weight: bold;
text-align: center;
height: 30px;
width: 60px;
margin: 20px;
padding: 5px;
display: flex;
justify-content: center;
 align-items: center;
 

}

.calender .date-day:nth-child(7n+6){
    background-color: darkgoldenrod;
}




.day {


background-color: brown;
border-radius: 5px;
font-size: 20px;
font-weight: bold;
text-align: center;
height: 30px;
width: 50px;
margin-top: 20px;
margin-bottom: 20px;
margin-left: 30px;
margin-right: 20px;
padding: 5px;
display: flex;
justify-content: center;
 align-items: center;

}


.calender .day:nth-child(7n+6){
    background-color: darkgoldenrod;
}

.other-month{
background-color: #e0e0e0;
border-radius: 5px;
font-size: 20px;
font-weight: bold;
text-align: center;
height: 30px;
width: 50px;
margin-top: 20px;
margin-bottom: 20px;
margin-left: 30px;
margin-right: 20px;
padding: 5px;
display: flex;
justify-content: center;
 align-items: center;

}






</style>


</head>
<body>
 
    <h1>CALENDER 2026</h1>
<div class="calender" >

    

    

    <div  class="date-day">Sun</div>

</html>
